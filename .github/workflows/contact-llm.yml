name: Run Test Suite

on:
  workflow_dispatch:
    inputs:
      suite:
        description: 'Suite name to run (matches Suites/<name>.json, no extension)'
        required: true
      site:
        description: 'API endpoint to contact'
        required: true
        default: 'https://api.anthropic.com/v1/messages'
      model:
        description: 'Target model under test'
        required: false
        default: 'claude-sonnet-5'
      judge_model:
        description: 'Judge model (defaults to the target model if left blank)'
        required: false
      effort:
        description: 'Reasoning effort: low | medium | high | xhigh | max (leave blank for models without effort/thinking support, e.g. Haiku)'
        required: false

permissions:
  contents: write

jobs:
  run-suite:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Tools/llm-contact
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run suite
        env:
          SITE: ${{ inputs.site }}
          SUITE: ${{ inputs.suite }}
          MODEL: ${{ inputs.model }}
          JUDGE_MODEL: ${{ inputs.judge_model }}
          EFFORT: ${{ inputs.effort }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node run-suite.js

      - name: Commit run result
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ../../Runs/
          git diff --cached --quiet || git commit -m "Run result: ${{ inputs.suite }} on ${{ inputs.model }} (run ${{ github.run_id }})"
          git push

      - name: Upload run result as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: run-${{ github.run_id }}
          path: Runs/
          retention-days: 30
