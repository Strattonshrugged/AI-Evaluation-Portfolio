name: Run Test Suite

on:
  workflow_dispatch:
    inputs:
      suites:
        description: 'Suite name(s) to run, comma-separated (matches Suites/<name>.json, no extension)'
        required: true
      site:
        description: 'API endpoint to contact'
        required: true
        default: 'https://api.anthropic.com/v1/messages'
      model:
        description: 'Target model under test'
        required: false
        default: 'claude-sonnet-5'
      judge_model:
        description: 'Judge model (defaults to the target model if left blank)'
        required: false
      effort:
        description: 'Reasoning effort: low | medium | high | xhigh | max (leave blank for models without effort/thinking support, e.g. Haiku)'
        required: false

jobs:
  run-suite:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Tools/llm-contact
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run suite(s)
        env:
          SITE: ${{ inputs.site }}
          SUITES: ${{ inputs.suites }}
          MODEL: ${{ inputs.model }}
          JUDGE_MODEL: ${{ inputs.judge_model }}
          EFFORT: ${{ inputs.effort }}
          API_KEY: ${{ secrets.LLM_API_KEY }}
        run: node run-suite.js

      - name: Upload run results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: runs-${{ github.run_id }}
          path: Runs/
          retention-days: 30
